
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost & Found</title>
  <style>
    body { font-family: Arial, sans-serif; background: #eef2f3; margin: 0; }
    header { background: #007BFF; color: #fff; padding: 15px; text-align: center; }
    .container { max-width: 800px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 8px; }
    h2 { text-align: center; }
    input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; background: #007BFF; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .item-list { margin-top: 20px; }
    .item { border-bottom: 1px solid #ddd; padding: 15px; display: flex; align-items: center; }
    .item img { max-width: 80px; margin-right: 15px; border-radius: 6px; }
    nav { background: #f8f9fa; padding: 10px; text-align: center; }
    nav a { margin: 0 10px; text-decoration: none; color: #007BFF; }
  </style>
</head>
<body>
  <header>
    <h1>Lost & Found Portal</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="backend.html">Admin Page</a>
  </nav>

  <div class="container">
    <h2>Upload Lost/Found Item</h2>
    <form id="uploadForm">
      <input type="text" id="itemName" placeholder="Item name" required>
      <textarea id="description" placeholder="Description" required></textarea>
      <input type="text" id="location" placeholder="Location" required>
      <input type="file" id="image">
      <button type="submit">Upload Item</button>
    </form>

    <h3>Items List</h3>
    <div class="item-list" id="itemList"></div>
  </div>

  <script>
    const itemList = document.getElementById("itemList");

    document.getElementById("uploadForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("itemName").value;
      const desc = document.getElementById("description").value;
      const loc = document.getElementById("location").value;
      const imgFile = document.getElementById("image").files[0];

      const itemDiv = document.createElement("div");
      itemDiv.className = "item";
      itemDiv.innerHTML = `<div><strong>${name}</strong><br>${desc}<br>📍 ${loc}</div>`;

      if(imgFile) {
        const imgURL = URL.createObjectURL(imgFile);
        const img = document.createElement("img");
        img.src = imgURL;
        itemDiv.prepend(img);
      }

      itemList.appendChild(itemDiv);
      document.getElementById("uploadForm").reset();
    });
  </script>
</body>
</html>
